name: "get_news"
display_name: "News Headlines"
description: "Get the latest news headlines by category via RSS feeds. Supports general, tech, sports, business, science, and health. Includes background agent for new article alerts."
version: "1.3.0"
min_jarvis_version: "0.1.4"
license: "MIT"
author:
  github: "alexberardi"
categories: ["information", "news"]
platforms: ["darwin", "linux"]
keywords: ["news", "headlines", "rss", "briefing", "current events", "alerts"]

components:
  - type: command
    name: get_news
    path: commands/get_news/command.py
  - type: agent
    name: news_alerts
    path: agents/news_alerts/agent.py

packages:
  - name: feedparser

secrets:
  - key: NEWS_RSS_FEEDS
    scope: integration
    value_type: string
    description: "Comma-separated custom RSS feed URLs (optional, merged with built-in feeds)"
    is_sensitive: false
  - key: NOTIFICATION_FILTER
    scope: integration
    value_type: string
    description: "Free-text instructions for when to send news alerts (e.g. 'only sports news'). Leave blank to receive all new article alerts."
    is_sensitive: false
